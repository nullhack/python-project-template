# Docker Compose for python-project-template
# Simplified development setup

services:
  # =============================================================================
  # Main application
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-template-app
    volumes:
      # Hot reload: mount source code
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml:ro
    ports:
      - "8000:8000"    # Main application
      - "8080:8080"    # Documentation server
      - "5678:5678"    # Debug port
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DEVELOPMENT=true
    command: python -m app
    restart: unless-stopped

  # =============================================================================
  # Test runner
  # =============================================================================  
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-template-test
    volumes:
      - ./:/app:ro
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    command: task test
    profiles:
      - test

  # =============================================================================
  # Documentation server
  # =============================================================================
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-template-docs
    volumes:
      - ./app:/app/app:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app
    command: task doc-serve
    profiles:
      - docs

  # =============================================================================
  # Code quality checks
  # =============================================================================
  quality:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-template-quality
    volumes:
      - ./:/app:ro
    environment:
      - PYTHONPATH=/app
    command: bash -c "task lint && task static-check"
    profiles:
      - quality

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    name: python-template-network