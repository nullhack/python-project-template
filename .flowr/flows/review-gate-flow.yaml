flow: review-gate-flow
version: 6.0.0
params: [feature_id]
exits:
  - pass
  - fail

states:
  - id: design-review
    attrs:
      description: "R verifies implementation aligns with domain model, follows DDD patterns, and respects architectural decisions"
      owner: R
      git: feature
      skills:
        - review-design
      in:
        - features/<feature_id>.feature
        - domain_model.md
        - glossary.md
        - product_definition.md
        - refactored-source
      out:
        - design_review_evidence
    conditions:
      design-approved:
        alignment: ==domain-model-verified
        adr-compliance: ==adrs-respected
    next:
      pass:
        to: structure-review
        when: design-approved
      fail: fail

  - id: structure-review
    attrs:
      description: "R verifies test coverage, BDD example pass rate, test coupling, and behavior-vs-structure testing"
      owner: R
      git: feature
      skills:
        - review-structure
        - verify-traceability
      in:
        - coverage-reports
        - test-output
        - refactored-source
        - features/<feature_id>.feature
        - domain_model.md
        - glossary.md
      out:
        - structure_review_evidence
    conditions:
      structure-approved:
        coverage: ==threshold-met
        traceability: ==all-ids-covered
        coupling: ==behavior-not-implementation
    next:
      pass:
        to: conventions-review
        when: structure-approved
      fail: fail

  - id: conventions-review
    attrs:
      description: "R verifies formatting, docstrings, type hints, import ordering, and lint rules unrelated to design"
      owner: R
      git: feature
      skills:
        - review-conventions
      in:
        - linter-output
        - refactored-source
        - product_definition.md
        - glossary.md
      out:
        - conventions_review_evidence
    conditions:
      conventions-approved:
        formatting: ==clean
        naming: ==domain-language
    next:
      pass:
        to: pass
        when: conventions-approved
      fail: fail
