flow: arch-cycle
version: 1.1.0
params: [feature_slug, branch_name]
exits: [complete, blocked]

states:
  - id: read
    attrs:
      agent: system-architect
      skill: architect
      phase: read
    next:
      ready: interview
      spec-gap: blocked

  - id: interview
    attrs:
      agent: system-architect
      skill: architect
      phase: interview
    next:
      gaps-found: interview
      adrs-drafted:
        to: validate
        when: { adrs_drafted: "==true" }

  - id: validate
    attrs:
      agent: system-architect
      skill: architect
      phase: validate
    next:
      adrs-approved:
        to: design
        when: { adrs_approved: "==true" }
      adrs-rejected: interview

  - id: design
    attrs:
      agent: system-architect
      skill: architect
      phase: design
    next:
      stubs-written:
        to: stubs
        when: { stubs_written: "==true" }

  - id: stubs
    attrs:
      agent: system-architect
      skill: architect
      phase: stubs
    next:
      test-fast-green: complete