flow: develop-flow
version: 2.0.0
params: [feature_id]
exits:
  - completed
  - needs-architecture
  - cancelled

states:
  - id: feature-selection
    attrs:
      description: "PO selects the next feature — by dependency count then WSJF"
      owner: PO
      git: dev
      skills:
        - select-feature
      in:
        - product_definition.md
        - domain_spec.md
        - "features/<feature_id>.feature"
      out: []
    next:
      selected: feature-examples
      needs-architecture: needs-architecture
      no-features: completed

  - id: feature-examples
    attrs:
      description: "PO converts rules to Example and Scenario Outline blocks with pre-mortem analysis"
      owner: PO
      git: dev
      skills:
        - write-bdd-features
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - glossary.md
      out:
        - features/<feature_id>.feature:
            - examples
    conditions:
      examples-complete:
        examples-complete: ==verified
    next:
      done:
        to: spec-review
        when: examples-complete

  - id: spec-review
    attrs:
      description: "R independently verifies the feature spec for cross-document consistency, domain alignment, BDD quality, and pre-mortem coverage"
      owner: R
      git: dev
      skills:
        - review-spec
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - glossary.md
      out: []
    conditions:
      spec-verified:
        spec-verified: ==verified
    next:
      done:
        to: development
        when: spec-verified
      fail: feature-examples

  - id: development
    attrs:
      description: "Implement the feature through TDD cycles, review, and commit"
      git: feature
    flow: development-flow
    flow-version: "^13"
    next:
      done: acceptance

  - id: acceptance
    attrs:
      description: "PO validates business behavior against BDD examples and quality attributes"
      owner: PO
      git: feature
      skills:
        - accept-feature
        - verify-traceability
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - glossary.md
        - ".cache/interview-notes/*.md"
      out:
        - ".cache/acceptance/<feature_id>.md"
    conditions:
      feature-accepted:
        acceptance-verified: ==verified
    next:
      approved:
        to: polish
        when: feature-accepted
      rejected: development

  - id: polish
    attrs:
      description: "SE applies full project conventions — naming, docstrings, formatting, type annotations — after feature acceptance"
      owner: SE
      git: feature
      skills:
        - polish-code
      in:
        - source-implementations
        - test-implementations
        - features/<feature_id>.feature
      out:
        - polished-source
    next:
      polished: commit-polished

  - id: commit-polished
    attrs:
      description: "SE commits polished code to the feature branch with traceability"
      owner: SE
      git: feature
      skills:
        - commit-implementation
      in:
        - polished-source
        - test-implementations
        - features/<feature_id>.feature
      out:
        - feature-commits
    conditions:
      committed:
        committed: ==verified
    next:
      done:
        to: completed
        when: committed