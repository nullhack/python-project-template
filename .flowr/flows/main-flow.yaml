flow: main-flow
version: 11.0.0
exits: [completed, cancelled, rejected]

states:
  - id: discovery
    attrs:
      description: "Interview stakeholders and create structural domain specification"
      git: dev
    flow: discovery-flow
    flow-version: "^12"
    next:
      complete: spec-validation

  - id: spec-validation
    attrs:
      description: "Iteratively simulate domain spec, discover rules and pain points, fix until clean"
      git: dev
    flow: spec-validation-flow
    flow-version: "^2"
    next:
      validated: architecture
      needs-reinterview: discovery

  - id: architecture
    attrs:
      description: "Design technical architecture, context boundaries, and API contracts for the entire project"
      git: dev
    flow: architecture-flow
    flow-version: "^10"
    next:
      complete: feature-development
      needs-discovery: discovery

  - id: feature-development
    attrs:
      description: "Feature-level loop: Planning -> Development -> Acceptance -> Delivery per feature"
      git: feature
    flow: feature-development-flow
    flow-version: "^12"
    next:
      needs-architecture: architecture
      cancelled: cancelled
      completed: completed
      rejected: rejected
