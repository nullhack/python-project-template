flow: discovery-flow
version: 11.0.0
exits:
  - complete

states:
  - id: stakeholder-interview
    attrs:
      description: "PO interviews stakeholders to understand pain points, business goals, and domain terms, then decides how much discovery is needed"
      owner: PO
      git: main
      skills:
        - conduct-interview
      in:
        - "interview-notes/*.md"  # optional
        - "domain_model.md"  # optional — for re-interview context
        - "product_definition.md"  # optional — for re-interview context
      out:
        - "interview-notes/<session_id>.md"
    next:
      needs_full_discovery: domain-discovery
      needs_scope_only: scope-boundary
      already_known: complete

  - id: domain-discovery
    attrs:
      description: "DE facilitates event storming and co-emergent ubiquitous language definition, producing domain_model.md and glossary.md as paired outputs"
      owner: DE
      git: main
      skills:
        - facilitate-event-storming
        - domain-discovery
        - define-ubiquitous-language
      in:
        - interview-notes/*.md
        - "domain_model.md"  # optional — cumulative edit across iterations
        - "glossary.md"  # optional — cumulative edit across iterations
      out:
        - domain_model.md:
            - summary
            - bounded_contexts
            - events_and_commands
            - entities
            - relationships
            - aggregate_boundaries
            - context_map
            - changes
        - glossary.md
    next:
      done: scope-boundary
      needs_reinterview: stakeholder-interview

  - id: scope-boundary
    attrs:
      description: "PO defines what the product IS and IS NOT, who the users are, and the delivery order"
      owner: PO
      git: main
      skills:
        - define-product-scope
      in:
        - domain_model.md
        - glossary.md
      out:
        - product_definition.md:
            - what_is
            - what_is_not
            - why
            - users
            - out_of_scope
            - delivery_order
            - quality_attributes
            - deployment
    next:
      done: feature-discovery
      needs_reinterview: stakeholder-interview

  - id: feature-discovery
    attrs:
      description: "PO identifies feature boundaries from the delivery order, then derives business rules and constraints from domain model artifacts"
      owner: PO
      git: main
      skills:
        - discover-features
        - discover-rules
      in:
        - product_definition.md
        - domain_model.md
        - glossary.md
        - "features/*.feature"  # optional — existing features for cumulative edit
      out:
        - features/<feature_id>.feature:
            - title
            - description
            - rules_business
            - constraints
    conditions:
      committed_to_main_locally:
        committed_to_main_locally: ==verified
    next:
      done:
        to: complete
        when: committed_to_main_locally
      needs_reinterview: stakeholder-interview
