flow: discovery-flow
version: 12.0.0
exits:
  - complete

states:
  - id: stakeholder-interview
    attrs:
      description: "PO interviews stakeholders to understand pain points, business goals, and domain terms"
      owner: PO
      git: dev
      skills:
        - conduct-interview
      in:
        - "interview-notes/*.md"  # optional
        - "behavioral_spec.md"  # optional — for re-interview context
        - "product_definition.md"  # optional — for re-interview context
      out:
        - "interview-notes/<session_id>.md"
    next:
      needs-spec: spec-creation
      already-known: complete

  - id: spec-creation
    attrs:
      description: "SA and DE create a structural behavioral specification per bounded context from interview notes"
      owner: SA
      git: dev
      skills:
        - create-behavioral-spec
        - define-ubiquitous-language
      in:
        - interview-notes/*.md
        - "behavioral_spec.md"  # optional — cumulative edit across iterations
        - "domain_model.md"  # optional — cumulative edit across iterations
        - "glossary.md"  # optional — cumulative edit across iterations
        - "product_definition.md"  # optional — cumulative edit across iterations
      out:
        - product_definition.md:
            - what_is
            - what_is_not
            - why
            - users
            - out_of_scope
            - delivery_order
            - quality_attributes
        - domain_model.md:
            - summary
            - bounded_contexts
            - entities
            - relationships
            - aggregate_boundaries
        - behavioral_spec.md:
            - context
            - entities
            - data_shapes
            - integration_points
            - external_contracts
        - glossary.md
    conditions:
      committed-to-dev-locally:
        committed-to-dev-locally: ==verified
    next:
      done:
        to: complete
        when: committed-to-dev-locally
      needs-reinterview: stakeholder-interview
