flow: feature-development-flow
version: 9.0.0
params: [feature_id]

exits:
  - needs-architecture
  - cancelled
  - completed
  - rejected

states:
  - id: planning
    attrs:
      description: "Plan feature breakdown, BDD scenarios, and development readiness"
      git: main
    flow: planning-flow
    flow-version: "^11"
    next:
      complete: development
      needs-architecture: needs-architecture
      no-features: completed

  - id: development
    attrs:
      description: "Implement the feature through TDD cycles, review, and commit"
      git: feature
    flow: development-flow
    flow-version: "^9"
    next:
      done: delivery

  - id: delivery
    attrs:
      description: "Accept, merge, and publish the completed feature"
      git: feature
    flow: delivery-flow
    flow-version: "^5"
    next:
      next-feature: planning
      rejected: rejected
      needs-development: development
      cancelled: cancelled