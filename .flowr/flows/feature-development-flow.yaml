flow: feature-development-flow
version: 7.0.0
params: [feature_name]

exits:
  - needs_architecture
  - cancelled
  - completed

states:
  - id: planning
    attrs:
      description: "Plan feature breakdown, BDD scenarios, and development readiness"
      git: main
    flow: planning-flow
    flow-version: "^6"
    next:
      complete: development
      needs_architecture: needs_architecture
      no_features: completed

  - id: development
    attrs:
      description: "Implement the feature through TDD cycles, review, and commit"
      git: feature
    flow: development-flow
    flow-version: "^5"
    next:
      done: delivery
      needs_planning: planning

  - id: delivery
    attrs:
      description: "Accept, merge, and publish the completed feature"
      git: feature
    flow: delivery-flow
    flow-version: "^5"
    next:
      next-feature: planning
      rejected: post-mortem
      needs_development: development
      cancelled: cancelled

  - id: post-mortem
    attrs:
      description: "Investigate rejection, document findings, and determine corrective action"
      git: main
    flow: post-mortem-flow
    flow-version: "^3"
    next:
      complete: planning
      needs_architecture: needs_architecture
      no_action: cancelled