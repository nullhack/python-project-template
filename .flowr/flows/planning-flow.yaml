flow: planning-flow
version: 6.0.0
params: [feature_name]
exits:
  - complete
  - needs_architecture
  - no_features

states:
  - id: feature-selection
    attrs:
      description: "PO selects the next feature — by delivery order for first feature, by WSJF for subsequent features"
      owner: PO
      git: main
      skills:
        - select-feature
      in:
        - product_definition.md
        - technical_design.md
      out: []
    next:
      selected: feature-breakdown
      needs_architecture: needs_architecture
      no_features: no_features

  - id: feature-breakdown
    attrs:
      description: "PO refines coarse Rules from discovery into full Rule blocks with INVEST validation, adding detail through targeted clarification"
      owner: PO
      git: main
      skills:
        - break-down-feature
      in:
        - features/<feature_name>.feature
        - product_definition.md
        - technical_design.md
        - interview-notes/*.md
      out:
        - features/<feature_name>.feature:
            - rules
    conditions:
      invest_passed:
        independent: ==no_shared_data_or_side_effects
        negotiable: ==scope_negotiated
        valuable: ==user_value_clear
        estimable: ==effort_estimated
        small: ==fits_single_sprint
        testable: ==acceptance_criteria_defined
    next:
      done:
        to: feature-examples
        when: invest_passed
      needs_respecification: feature-breakdown

  - id: feature-examples
    attrs:
      description: "PO writes concrete Given/When/Then Example blocks for each Rule in the feature file using ubiquitous language from the glossary"
      owner: PO
      git: main
      skills:
        - write-bdd-features
      in:
        - features/<feature_name>.feature
        - product_definition.md
        - domain_model.md
        - glossary.md
      out:
        - features/<feature_name>.feature:
            - examples
    conditions:
      examples_have_ids:
        all_examples_have_ids: ==verified
      examples_have_gherkin:
        all_examples_have_gherkin: ==verified
      premortem_done:
        premortem_done: ==verified
      decomposition_valid:
        concerns: <=2
        must_examples: <=8
      examples_complete:
        all_examples_have_ids: ==verified
        all_examples_have_gherkin: ==verified
        premortem_done: ==verified
        concerns: <=2
        must_examples: <=8
        all_examples_observable: ==each_then_describes_single_outcome
        all_examples_declarative: ==behaviour_not_ui_steps
        distinctness_verified: ==no_duplicate_observable_behaviours
    next:
      done:
        to: create-py-stubs
        when: examples_complete
      needs_respecification: feature-breakdown

  - id: create-py-stubs
    attrs:
      description: "SA creates minimum typed stubs and test stubs as domain model breadcrumbs for the current feature"
      owner: SA
      git: main
      skills:
        - create-py-stubs
      in:
        - features/<feature_name>.feature
        - technical_design.md
        - domain_model.md
        - glossary.md
      out:
        - typed_source_stubs
        - test_skeletons
    conditions:
      stubs_traceable:
        all_ids_have_stubs: ==verified
    next:
      done: definition-of-done

  - id: definition-of-done
    attrs:
      description: "PO tailors the definition of done criteria based on the specific feature's requirements"
      owner: PO
      git: main
      skills:
        - define-done
      in:
        - features/<feature_name>.feature
        - product_definition.md
      out:
        - product_definition.md:
            - definition_of_done
    next:
      done: ready

  - id: ready
    attrs:
      description: "PO confirms all planning artifacts are complete and the feature is ready for development"
      owner: PO
      git: main
      skills:
        - confirm-baseline
      in:
        - features/<feature_name>.feature
        - product_definition.md
      out: []
    conditions:
      feature_baselined:
        feature_status: ==BASELINED
      committed_to_main_locally:
        committed_to_main_locally: ==verified
    next:
      done:
        to: complete
        when:
          - feature_baselined
          - committed_to_main_locally
