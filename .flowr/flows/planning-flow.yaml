flow: planning-flow
version: 9.0.0
params: [feature_id]
exits:
  - complete
  - needs-architecture
  - no-features

states:
  - id: feature-selection
    attrs:
      description: "PO selects the next feature — by delivery order for first feature, by WSJF for subsequent features"
      owner: PO
      git: main
      skills:
        - select-feature
      in:
        - product_definition.md
        - domain_model.md
        - "features/<feature_id>.feature"  # optional — discover available features
      out: []
    next:
      selected: feature-breakdown
      needs-architecture: needs-architecture
      no-features: no-features

  - id: feature-breakdown
    attrs:
      description: "PO refines coarse Rules from discovery into full Rule blocks with INVEST validation, adding detail through targeted clarification"
      owner: PO
      git: main
      skills:
        - break-down-feature
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_model.md
        - glossary.md
      out:
        - features/<feature_id>.feature:
            - rules
    conditions:
      invest-passed:
        independent: ==no-shared-data-or-side-effects
        negotiable: ==scope-negotiated
        valuable: ==user-value-clear
        estimable: ==effort-estimated
        small: ==fits-single-sprint
        testable: ==acceptance-criteria-defined
    next:
      done:
        to: feature-examples
        when: invest-passed
      needs-respecification: feature-breakdown

  - id: feature-examples
    attrs:
      description: "PO writes concrete Given/When/Then Example blocks for each Rule in the feature file using ubiquitous language from the glossary"
      owner: PO
      git: main
      skills:
        - write-bdd-features
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_model.md
        - glossary.md
      out:
        - features/<feature_id>.feature:
            - examples
    conditions:
      examples-have-ids:
        all-examples-have-ids: ==verified
      examples-have-gherkin:
        all-examples-have-gherkin: ==verified
      premortem-done:
        premortem-done: ==verified
      decomposition-valid:
        concerns: <=2
        must-examples: <=8
      examples-complete:
        all-examples-have-ids: ==verified
        all-examples-have-gherkin: ==verified
        premortem-done: ==verified
        concerns: <=2
        must-examples: <=8
        all-examples-observable: ==each-then-describes-single-outcome
        all-examples-declarative: ==behaviour-not-ui-steps
        distinctness-verified: ==no-duplicate-observable-behaviours
    next:
      done:
        to: create-py-stubs
        when: examples-complete
      needs-respecification: feature-breakdown

  - id: create-py-stubs
    attrs:
      description: "SA creates minimum typed stubs and test stubs as domain model breadcrumbs for the current feature"
      owner: SA
      git: main
      skills:
        - create-py-stubs
      in:
        - features/<feature_id>.feature
        - domain_model.md
        - glossary.md
      out:
        - typed-source-stubs
        - test-skeletons
    conditions:
      stubs-traceable:
        all-ids-have-stubs: ==verified
    next:
      done: definition-of-done

  - id: definition-of-done
    attrs:
      description: "PO tailors the definition of done criteria based on the specific feature's requirements"
      owner: PO
      git: main
      skills:
        - define-done
      in:
        - features/<feature_id>.feature
        - product_definition.md
      out:
        - product_definition.md:
            - definition_of_done
    next:
      done: ready

  - id: ready
    attrs:
      description: "PO confirms all planning artifacts are complete and the feature is ready for development"
      owner: PO
      git: main
      skills:
        - confirm-baseline
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_model.md
      out: []
    conditions:
      feature-baselined:
        baseline-confirmed: ==verified
      committed-to-main-locally:
        committed-to-main-locally: ==verified
    next:
      done:
        to: complete
        when:
          - feature-baselined
          - committed-to-main-locally
