flow: planning-flow
version: 15.0.0
params: [feature_id]
exits:
  - complete
  - needs-architecture
  - no-features

states:
  - id: feature-discovery
    attrs:
      description: "PO refines simulation-created feature files: splits/renames, redistributes Rule blocks, adds Constraints from quality attributes"
      owner: PO
      git: dev
      skills:
        - discover-features
      in:
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - glossary.md
        - "features/*.feature"  # optional — may not exist on first cycle
      out:
        - features/<feature_id>.feature:
            - feature_header
            - constraints
            - rules
    conditions:
      features-discovered:
        features-discovered: ==verified
      committed-to-dev-locally:
        committed-to-dev-locally: ==verified
    next:
      done:
        to: feature-selection
        when:
          - features-discovered
          - committed-to-dev-locally
      no-features: no-features

  - id: feature-selection
    attrs:
      description: "PO selects the next feature — by delivery order for first feature, by WSJF for subsequent features"
      owner: PO
      git: dev
      skills:
        - select-feature
      in:
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - "features/<feature_id>.feature"  # optional — discover available features
      out: []
    next:
      selected: feature-breakdown
      needs-architecture: needs-architecture
      no-features: no-features

  - id: feature-breakdown
    attrs:
      description: "PO validates INVEST, adds behavior hints under each Rule"
      owner: PO
      git: dev
      skills:
        - break-down-feature
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - glossary.md
      out:
        - features/<feature_id>.feature:
            - rules
            - behavior_hints
    conditions:
      invest-passed:
        invest-passed: ==verified
    next:
      done:
        to: feature-examples
        when: invest-passed

  - id: feature-examples
    attrs:
      description: "PO converts behavior hints to Example and Scenario Outline blocks"
      owner: PO
      git: dev
      skills:
        - write-bdd-features
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - glossary.md
      out:
        - features/<feature_id>.feature:
            - examples
    conditions:
      examples-complete:
        examples-complete: ==verified
    next:
      done:
        to: spec-review
        when: examples-complete

  - id: spec-review
    attrs:
      description: "R independently verifies the feature spec for cross-document consistency, domain alignment, BDD quality, and pre-mortem coverage"
      owner: R
      git: dev
      skills:
        - review-spec
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - glossary.md
      out: []
    conditions:
      spec-verified:
        spec-verified: ==verified
    next:
      done:
        to: create-py-stubs
        when: spec-verified
      fail: feature-breakdown

  - id: create-py-stubs
    attrs:
      description: "SA creates typed source stubs and generates test stubs via pytest-beehave, then verifies all planning artifacts are complete before baseline"
      owner: SA
      git: dev
      skills:
        - create-py-stubs
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - simulation_results.md
        - glossary.md
      out:
        - typed-source-stubs
        - test-skeletons
    conditions:
      stubs-traceable:
        beehave-check-passes: ==verified
      baseline-confirmed:
        baseline-confirmed: ==verified
      committed-to-dev-locally:
        committed-to-dev-locally: ==verified
    next:
      done:
        to: complete
        when:
          - stubs-traceable
          - baseline-confirmed
          - committed-to-dev-locally
