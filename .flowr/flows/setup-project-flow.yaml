flow: setup-project-flow
version: 3.0.0
exits: [initialized, cancelled]

states:
  - id: assess-requirements
    attrs:
      description: "Interview user to understand project needs and assess parameters"
      owner: Setup Agent
      git: main
      skills:
        - setup-assess
      in: []
      out:
        - requirements_assessment
    next:
      assessed: configure-parameters
      cancelled: cancelled

  - id: configure-parameters
    attrs:
      description: "Gather and confirm project parameters based on assessment"
      owner: Setup Agent
      git: main
      skills:
        - setup-configure
      in:
        - requirements_assessment
      out:
        - template-config.yaml
    conditions:
      template-files-exist:
        pyproject-toml: ==exists
        readme-md: ==exists
        github-workflows-ci-yml: ==exists
        license: ==exists
        tests-unit-main-test-py: ==exists
        app-directory: ==exists
    next:
      confirmed:
        to: apply-substitutions
        when: template-files-exist
      missing-files: cancelled

  - id: apply-substitutions
    attrs:
      description: "Apply all text substitutions, rename package, reset version"
      owner: Setup Agent
      git: main
      skills:
        - setup-apply
      in:
        - template-config.yaml
      out:
        - pyproject.toml
        - README.md
        - tests/unit/main_test.py
        - .github/workflows/ci.yml
        - LICENSE
        - template-config.yaml
        - package_directory
    conditions:
      substitutions-successful:
        no-stale-app-imports: ==verified
        package-renamed: ==verified
        version-reset: ==verified
    next:
      applied:
        to: verify-and-finalize
        when: substitutions-successful
      failed: cancelled

  - id: verify-and-finalize
    attrs:
      description: "Verify transformations, clean template artifacts, finalize project"
      owner: Setup Agent
      git: main
      skills:
        - setup-verify
      in:
        - package_directory
      out:
        - git_remote
    conditions:
      verification-passed:
        tests-pass: ==verified
        imports-valid: ==verified
        artifacts-cleaned: ==verified
      committed-to-main-locally:
        committed-to-main-locally: ==verified
    next:
      initialized:
        to: initialized
        when:
          - verification-passed
          - committed-to-main-locally
      failed: cancelled