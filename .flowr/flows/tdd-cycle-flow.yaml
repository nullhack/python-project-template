flow: tdd-cycle-flow
version: 8.0.0
params: [feature_id]
exits:
  - all-green

states:
  - id: red
    attrs:
      description: "SE writes a failing test body for one BDD example, specifying expected behavior before implementation exists"
      owner: SE
      git: feature
      skills:
        - write-test
      in:
        - test-skeletons
        - typed-source-stubs
        - features/<feature_id>.feature
        - domain_model.md
        - behavioral_spec.md
        - glossary.md
      out:
        - test-implementations
    next:
      test-written: green

  - id: green
    attrs:
      description: "SE writes the minimum production code needed to make the failing test pass"
      owner: SE
      git: feature
      skills:
        - implement-minimum
      in:
        - test-implementations
        - typed-source-stubs
        - features/<feature_id>.feature
        - domain_model.md
        - behavioral_spec.md
        - glossary.md
      out:
        - source-implementations
    next:
      test-passes: refactor

  - id: refactor
    attrs:
      description: "SE improves code structure while keeping all tests passing, then cycles to the next example or exits when all pass"
      owner: SE
      git: feature
      skills:
        - refactor
      in:
        - source-implementations
        - test-implementations
        - features/<feature_id>.feature
        - domain_model.md
        - behavioral_spec.md
        - glossary.md
      out:
        - source-implementations
    next:
      next-example: red
      all-examples-pass: all-green
