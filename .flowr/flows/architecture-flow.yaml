flow: architecture-flow
version: 8.0.0
exits:
  - complete
  - needs_discovery

states:
  - id: architecture-assessment
    attrs:
      description: "SA evaluates whether the feature requires new architecture or fits the existing system, potentially overriding deployment decisions"
      owner: SA
      git: main
      skills:
        - assess-architecture
      in:
        - product_definition.md
        - domain_model.md
      out:
        - product_definition.md:
            - deployment
            - quality_attributes
    conditions:
      architecture_complete:
        architecture_complete: ==verified
      architecture_exists:
        domain_model_md: ==exists
      no_architecture_exists:
        domain_model_md: ==missing
    next:
      no_architecture_needed:
        to: complete
        when: architecture_complete
      needs_context_update:
        to: context-mapping
        when: architecture_exists
      needs_technical_design:
        to: technical-design
        when: architecture_exists
      greenfield:
        to: context-mapping
        when: no_architecture_exists
      delivery_mismatch_unresolvable: needs_discovery
      needs_discovery: needs_discovery

  - id: context-mapping
    attrs:
      description: "SA maps bounded context relationships, Vernon patterns, and anti-corruption layers into domain_model.md"
      owner: SA
      git: main
      skills:
        - map-contexts
      in:
        - domain_model.md
        - product_definition.md
        - glossary.md
      out:
        - domain_model.md:
            - context_map
            - changes
    next:
      done: technical-design
      needs_discovery: needs_discovery

  - id: technical-design
    attrs:
      description: "SA selects technology stack, documents dependencies, and drafts ADRs for architectural decisions"
      owner: SA
      git: main
      skills:
        - design-technical-solution
        - draft-adr
      in:
        - domain_model.md
        - glossary.md
        - product_definition.md
      out:
        - product_definition.md:
            - technology_stack
            - dependencies
        - adr/<adr_id>.md
    next:
      done: review-signoff

  - id: review-signoff
    attrs:
      description: "R independently verifies architecture alignment with domain model and requirements, and cross-document consistency, before implementation begins"
      owner: R
      git: main
      skills:
        - review-architecture
      in:
        - "adr/<adr_id>.md"  # optional
        - product_definition.md
        - domain_model.md
        - glossary.md
      out: []
    conditions:
      architecture_approved:
        alignment: ==domain_model_verified
        adr_compliance: ==adrs_respected
      committed_to_main_locally:
        committed_to_main_locally: ==verified
    next:
      approved:
        to: complete
        when:
          - architecture_approved
          - committed_to_main_locally
      inconsistent: architecture-assessment
      needs_discovery: needs_discovery
