flow: post-mortem-flow
version: 3.0.0
exits:
  - complete
  - needs-architecture
  - no-action

states:
  - id: root-cause-analysis
    attrs:
      description: "R investigates why the PR was rejected, identifying the failure point and missed gate"
      owner: R
      git: main
      skills:
        - analyze-root-cause
      in: []
      out:
        - root-cause-analysis
    next:
      issues-found: document-findings
      no-issues-found: no-action

  - id: document-findings
    attrs:
      description: "R records what failed, why, and which quality gate was missed"
      owner: R
      git: main
      skills:
        - document-post-mortem
      in:
        - root-cause-analysis
      out:
        - post-mortem/PM_YYYYMMDD_<pm_id>.md:
            - failed_at
            - root_cause
            - missed_gate
    next:
      done: extract-lessons

  - id: extract-lessons
    attrs:
      description: "R determines the corrective fix and updates the post-mortem with remediation steps"
      owner: R
      git: main
      skills:
        - extract-lessons
      in:
        - post-mortem/PM_YYYYMMDD_<pm_id>.md
      out:
        - post-mortem/PM_YYYYMMDD_<pm_id>.md:
            - fix
    next:
      done: action-items

  - id: action-items
    attrs:
      description: "R determines whether the feature needs replanning, architecture changes, or should be abandoned"
      owner: R
      git: main
      skills:
        - determine-action-items
      in:
        - post-mortem/PM_YYYYMMDD_<pm_id>.md
      out:
        - post-mortem/PM_YYYYMMDD_<pm_id>.md:
            - restart_check
    next:
      replan: complete
      architecture-issue: needs-architecture
      abandon: no-action