flow: tdd-cycle
version: 3.0.0
params: [feature_slug, branch_name, test_dir, source_dir]
exits: [design-review-ready, blocked]

states:
  - id: setup
    attrs:
      agent: software-engineer
      skill: implement
      phase: setup
    next:
      branch-ready: red
      branch-exists: red

  - id: red
    attrs:
      agent: software-engineer
      skill: implement
      phase: red
    next:
      test-written: green
      spec-gap: blocked

  - id: green
    attrs:
      agent: software-engineer
      skill: implement
      phase: green
    next:
      test-passing: refactor

  - id: refactor
    attrs:
      agent: software-engineer
      skill: implement
      phase: refactor
    next:
      more-ids: red
      all-ids-done: design-review-ready