flow: delivery-flow
version: 9.0.0
params: [feature_id]

exits:
  - next-feature
  - rejected
  - needs-development
  - cancelled

states:
  - id: acceptance
    attrs:
      description: "PO validates business behavior against BDD scenarios and quality attributes"
      owner: PO
      git: feature
      skills:
        - accept-feature
        - verify-traceability
      in:
        - features/<feature_id>.feature
        - product_definition.md
        - domain_spec.md
        - glossary.md
        - "interview-notes/*.md"  # optional — for requirement traceability
      out:
        - approval_record
    conditions:
      feature-accepted:
        acceptance-verified: ==verified
    next:
      approved:
        to: polish
        when: feature-accepted
      rejected: rejected

  - id: polish
    attrs:
      description: "SE applies full project conventions — naming, docstrings, formatting, type annotations — now that the feature is functionally complete"
      owner: SE
      git: feature
      skills:
        - polish-code
      in:
        - source-implementations
        - test-implementations
        - features/<feature_id>.feature
      out:
        - polished-source
    next:
      polished: local-merge

  - id: local-merge
    attrs:
      description: "SE squash-merges feature commits into local dev branch and resolves any conflicts"
      owner: SE
      git: dev
      skills:
        - merge-local
      in:
        - polished-source
        - feature-commits
        - approval_record
        - features/<feature_id>.feature
      out:
        - merged-commits
    next:
      merged: publish-decision
      conflict: needs-development

  - id: publish-decision
    attrs:
      description: "PO decides whether to publish the accumulated batch as a PR or continue accumulating features on local dev"
      owner: PO
      git: dev
      skills:
        - decide-batch-action
      in:
        - merged-commits
      out: []
    next:
      accumulate: next-feature
      publish: pr-creation

  - id: pr-creation
    attrs:
      description: "SE creates an administrative PR for changes already on local dev"
      owner: SE
      git: dev
      skills:
        - create-pr
      in:
        - merged-commits
        - features/<feature_id>.feature
      out: []
    conditions:
      merged:
        ci-passes: ==verified
        no-changes-requested: ==verified
    next:
      approved:
        to: next-feature
        when: merged
      changes-requested: needs-development
      cancelled: cancelled
