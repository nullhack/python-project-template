flow: development-flow
version: 12.0.0
params: [feature_id]
exits:
  - done

states:
  - id: feature-structuring
    attrs:
      description: "SA creates the feature branch and feature-level structure — package directories, port interfaces, aggregate root signatures — before TDD cycles begin"
      owner: SA
      git: feature
      skills:
        - structure-feature
      in:
        - features/<feature_id>.feature
        - domain_spec.md
        - simulation_results.md
        - glossary.md
        - product_definition.md
      out:
        - git_branch
    next:
      ready: tdd-cycle

  - id: tdd-cycle
    attrs:
      description: "SE implements the feature through repeated RED-GREEN-REFACTOR cycles until all BDD examples pass"
      git: feature
    flow: tdd-cycle-flow
    flow-version: "^8"
    conditions:
      design-declared:
        yagni: ==no-premature-abstractions
        kiss: ==simplest-solution
        dry: ==no-duplicated-logic
        objcal: ==calisthenics-followed
        smells: ==all-smells-addressed
        solid: ==principles-applied
        patterns: ==patterns-justified
      traceability-verified:
        beehave-check: ==passed
    next:
      all-green:
        to: review-gate
        when:
          - design-declared
          - traceability-verified

  - id: review-gate
    attrs:
      description: "R independently verifies implementation across two tiers — design, structure — with traceability verified by beehave check"
      owner: R
      git: feature
      skills:
        - review-gate
      in:
        - test-implementations
        - source-implementations
        - features/<feature_id>.feature
        - domain_spec.md
        - "adr/*.md"  # optional
      out: []
    next:
      pass: commit-reviewed
      fail: tdd-cycle

  - id: commit-reviewed
    attrs:
      description: "SE commits the passing implementation with traceability to Example titles"
      owner: SE
      git: feature
      skills:
        - commit-implementation
      in:
        - source-implementations
        - test-implementations
        - features/<feature_id>.feature
      out:
        - feature-commits
    conditions:
      committed:
        committed: ==verified
    next:
      done:
        to: done
        when: committed
