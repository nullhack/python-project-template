flow: deliver-flow
version: 1.0.0
params: [feature_id]
exits:
  - published
  - accumulate
  - cancelled
  - needs-development

states:
  - id: local-merge
    attrs:
      description: "SE squash-merges feature commits into local dev branch and resolves any conflicts"
      owner: SE
      git: dev
      skills:
        - merge-local
      in:
        - ".cache/acceptance/<feature_id>.md"
        - features/<feature_id>.feature
      out:
        - merged-commits
    next:
      merged: publish-decision
      conflict: needs-development

  - id: publish-decision
    attrs:
      description: "PO decides whether to publish the accumulated batch as a PR or continue accumulating features on local dev"
      owner: PO
      git: dev
      skills:
        - decide-batch-action
      in:
        - merged-commits
      out: []
    next:
      accumulate: accumulate
      publish: pr-creation

  - id: pr-creation
    attrs:
      description: "SE creates an administrative PR for changes already on local dev"
      owner: SE
      git: dev
      skills:
        - create-pr
      in:
        - merged-commits
        - features/<feature_id>.feature
      out: []
    conditions:
      merged:
        ci-passes: ==verified
        no-changes-requested: ==verified
    next:
      approved:
        to: published
        when: merged
      changes-requested: needs-development
      cancelled: cancelled
