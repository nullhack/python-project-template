flow: spec-validation-flow
version: 2.0.0
exits:
  - validated
  - needs-reinterview

states:
  - id: simulate-spec
    attrs:
      description: "SA walks through domain spec scenarios mentally, creates I/O evidence, discovers rules and pain points"
      owner: SA
      git: dev
      skills:
        - simulate-spec
      in:
        - domain_spec.md
        - product_definition.md
        - glossary.md
        - ".cache/sim/simulation_results_*.md"  # optional — prior iterations
      out:
        - ".cache/sim/simulation_results_<timestamp>.md"
        - "features/<context>.feature"
    next:
      done: review-simulation

  - id: review-simulation
    attrs:
      description: "R adversarially reviews simulation results, validates pain points, decides PASS or FAIL"
      owner: R
      git: dev
      skills:
        - review-simulation
      in:
        - ".cache/sim/simulation_results_*.md"
        - domain_spec.md
        - product_definition.md
        - glossary.md
        - "features/*.feature"
      out:
        - ".cache/sim/simulation_results_<timestamp>.md":
            - summary
    conditions:
      simulation-approved:
        simulation-approved: ==verified
      committed-to-dev-locally:
        committed-to-dev-locally: ==verified
    next:
      approved:
        to: validated
        when:
          - simulation-approved
          - committed-to-dev-locally
      needs-fix: fix-spec
      max-iterations-reached: needs-reinterview

  - id: fix-spec
    attrs:
      description: "SA and DE rewrite domain spec addressing all pain points from simulation, full rewrite for coherence"
      owner: SA
      git: dev
      skills:
        - fix-spec
      in:
        - ".cache/sim/simulation_results_*.md"
        - domain_spec.md
        - product_definition.md
        - glossary.md
        - "features/<context>.feature"
      out:
        - domain_spec.md
        - ".cache/sim/simulation_results_<timestamp>.md"
        - "features/<context>.feature"
    next:
      done: simulate-spec
