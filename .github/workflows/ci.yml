name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# SECURITY: Restrict workflow permissions (GitHub Advanced Security recommendation)
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

env:
  # Improve pip performance
  PIP_NO_CACHE_DIR: false
  # SECURITY: Removed PIP_USER=1 (potential privilege escalation risk)
  # uv settings
  UV_SYSTEM_PYTHON: 1
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    # SECURITY: Job-level permissions for security scanning
    permissions:
      contents: read
      actions: read
      security-events: read  # For security scanning tools
    
    steps:
      - name: Checkout code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.1
        
      - name: Install uv
        uses: astral-sh/setup-uv@c0c76fcf76c37099e6a452584d04b015240faefc # v4.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          
      - name: Set up Python 3.13
        run: uv python install 3.13
        
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev
        
      - name: Run ruff linting (includes security checks)
        run: uv run task ruff-check
        
      - name: Check ruff formatting
        run: uv run task ruff-format-check
          
      - name: Run type checking
        run: uv run task static-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    # SECURITY: Minimal permissions for test execution
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    env:
      UV_SYSTEM_PYTHON: "false"
        
    steps:
      - name: Checkout code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.1
        
      - name: Install uv
        uses: astral-sh/setup-uv@c0c76fcf76c37099e6a452584d04b015240faefc # v4.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev && uv pip install -e .

      - name: Run fast tests
        run: uv run task test-fast
        
      - name: Run full test suite (main branch and PRs only)
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: uv run task test
        
      - name: Upload coverage reports
        if: matrix.python-version == '3.13' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            docs/coverage/
            docs/tests/
          retention-days: 30
          
      - name: Upload coverage to Codecov (optional)
        if: matrix.python-version == '3.13' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5.0.2
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build & Documentation
    runs-on: ubuntu-latest
    needs: [quality, test]
    # SECURITY: Minimal permissions for build and artifact upload
    permissions:
      contents: read
      actions: read
    env:
      UV_SYSTEM_PYTHON: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.1
        
      - name: Install uv
        uses: astral-sh/setup-uv@c0c76fcf76c37099e6a452584d04b015240faefc # v4.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          
      - name: Set up Python 3.13
        run: uv python install 3.13
        
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev && uv pip install -e .
        
      - name: Build documentation
        run: uv run task doc-build
        
      - name: Build package
        run: uv build
        
      - name: Verify package installation (wheel)
        run: |
          uv run --isolated --no-project --with dist/*.whl python -c "import app; print('✓ Wheel install successful')"
          
      - name: Verify package installation (sdist)
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz python -c "import app; print('✓ Source dist install successful')"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 30
          
      - name: Upload documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation
          path: docs/api/
          retention-days: 30

  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: [quality, test]
    # Only run when a PR is merged to main (push event), not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.1

      - name: Install uv
        uses: astral-sh/setup-uv@c0c76fcf76c37099e6a452584d04b015240faefc # v4.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Build and publish documentation
        run: uv run task doc-publish
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # Security summary job
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [quality]
    if: always()
    # SECURITY: Minimal permissions for summary generation
    permissions:
      contents: read
      actions: read
    
    steps:        
      - name: Security Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Ruff Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Security rules (S001-S701) checked during linting phase." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Additional Security Features" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency vulnerability scanning (safety + dependabot)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL security analysis (weekly + on pushes)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Comprehensive security rules via Ruff (flake8-bandit S001-S701)" >> $GITHUB_STEP_SUMMARY