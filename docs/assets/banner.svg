<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="temple8 banner — TEMPLE·VIII">
  <!--
    Colors:
      parchment      #faf7f2   main background
      parchment-mid  #ede8e0   mid-tone texture band
      stone          #c8c0b8   stone-course borders
      brown          #3b2410   temple silhouette, title main layer
      brown-mid      #5c3d1e   stylobate mid step
      gold           #c9a84c   ∞ glyph, pediment outline, divider, rules, · accent
      gold-light     #e8c96a   title carved-groove highlight layer
  -->

  <!-- ── Background: warm parchment ── -->
  <rect width="1200" height="300" fill="#faf7f2"/>
  <rect x="0" y="90"  width="1200" height="120" fill="#ede8e0" opacity="0.4"/>
  <rect x="0" y="0"   width="1200" height="5"   fill="#c8c0b8" opacity="0.5"/>
  <rect x="0" y="295" width="1200" height="5"   fill="#c8c0b8" opacity="0.5"/>

  <!-- ── Left zone: temple silhouette centred at (125,148) ── -->
  <g transform="translate(125,148)">

    <!-- Pediment — solid brown fill, gold outline -->
    <polygon
      points="0,-92 82,-54 -82,-54"
      fill="#3b2410"
      stroke="#c9a84c"
      stroke-width="1.5"
      stroke-linejoin="round"
    />

    <!-- Infinity glyph in pediment, centred at (0,-70) — gold on brown -->
    <path
      d="M0,-70
         C0,-73.9 -3.9,-76 -6.3,-76
         C-8.7,-76 -12,-73.9 -12,-70
         C-12,-66.1 -8.7,-64 -6.3,-64
         C-3.9,-64 0,-66.1 0,-70
         C0,-73.9 3.9,-76 6.3,-76
         C8.7,-76 12,-73.9 12,-70
         C12,-66.1 8.7,-64 6.3,-64
         C3.9,-64 0,-66.1 0,-70 Z"
      fill="none"
      stroke="#c9a84c"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Entablature -->
    <rect x="-82" y="-54" width="164" height="13" fill="#3b2410"/>
    <!-- Thin gold frieze line at entablature base -->
    <line x1="-82" y1="-41" x2="82" y2="-41" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>

    <!-- Column 1 -->
    <rect x="-70" y="-41" width="14" height="72" fill="#3b2410"/>
    <!-- Column 2 -->
    <rect x="-30" y="-41" width="14" height="72" fill="#3b2410"/>
    <!-- Column 3 -->
    <rect x="16"  y="-41" width="14" height="72" fill="#3b2410"/>
    <!-- Column 4 -->
    <rect x="56"  y="-41" width="14" height="72" fill="#3b2410"/>

    <!-- Stylobate — three graduated steps (lighter top → darker bottom) -->
    <rect x="-82" y="31"  width="164" height="9" fill="#3b2410"/>
    <rect x="-88" y="40"  width="176" height="8" fill="#5c3d1e"/>
    <rect x="-94" y="48"  width="188" height="7" fill="#3b2410" opacity="0.75"/>

  </g>

  <!-- ── Vertical gold divider ── -->
  <line x1="252" y1="48" x2="252" y2="252" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- ── Gold rule above title ── -->
  <line x1="278" y1="105" x2="1150" y2="105" stroke="#c9a84c" stroke-width="1" opacity="0.65"/>

  <!-- ── Title: TEMPLE·VIII — engraved two-layer effect ── -->

  <!-- Layer 1 (groove highlight): offset +1.5,+1.5, gold-light, low opacity -->
  <text
    x="711.5" y="179.5"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="300"
    letter-spacing="18"
    opacity="0.45"
  ><tspan fill="#e8c96a">TEMPLE</tspan><tspan fill="#e8c96a" letter-spacing="0">·</tspan><tspan fill="#e8c96a" letter-spacing="18">VIII</tspan></text>

  <!-- Layer 2 (carved face): main position, deep brown + gold dot -->
  <text
    x="710" y="178"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="300"
    letter-spacing="18"
  ><tspan fill="#3b2410">TEMPLE</tspan><tspan fill="#c9a84c" letter-spacing="0">·</tspan><tspan fill="#3b2410" letter-spacing="18">VIII</tspan></text>

  <!-- ── Gold rule below title ── -->
  <line x1="278" y1="200" x2="1150" y2="200" stroke="#c9a84c" stroke-width="1" opacity="0.65"/>

</svg>
