<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="temple8 banner">
  <style>
    :root {
      --color-dark: #1a1a1a;
      --color-dark-stone: #2a2a2a;
      --color-stone: #c8c0b8;
      --color-gold: #c9a84c;
      --color-gold-light: #e8c96a;
    }
    .bg { fill: var(--color-dark); }
    .bg-stone { fill: var(--color-dark-stone); }
    .title { fill: var(--color-stone); font-family: system-ui, -apple-system, sans-serif; font-size: 56px; font-weight: 700; letter-spacing: 8px; }
    .divider { stroke: var(--color-gold); stroke-width: 1; }
    .gold { fill: var(--color-gold-light); }
    .logo-mark { fill: var(--color-stone); }
  </style>

  <!-- Dark stone background -->
  <rect class="bg" width="1200" height="300"/>
  <rect class="bg-stone" x="0" y="250" width="1200" height="50"/>

  <!-- Left: Logo mark -->
  <g transform="translate(80, 150)">
    <polygon class="logo-mark" points="0,-60 50,-38 50,-18 -50,-18 -50,-38"/>
    <rect class="logo-mark" x="-50" y="-18" width="100" height="8"/>
    <rect class="logo-mark" x="-35" y="-10" width="8" height="45"/>
    <rect class="logo-mark" x="-4" y="-10" width="8" height="45"/>
    <rect class="logo-mark" x="27" y="-10" width="8" height="45"/>
    <rect class="logo-mark" x="-50" y="35" width="100" height="6"/>
    <rect class="logo-mark" x="-50" y="41" width="100" height="6"/>
    <!-- Infinity in pediment -->
    <path d="M0,-48 C-12,-48 -18,-42 -18,-38 C-18,-34 -12,-28 0,-28 C12,-28 18,-34 18,-38 C18,-42 12,-48 0,-48 M0,-48 C12,-48 18,-54 18,-58 C18,-62 12,-68 0,-68 C-12,-68 -18,-62 -18,-58 C-18,-54 -12,-48 0,-48"
          fill="none" stroke="var(--color-gold)" stroke-width="2.5"/>
  </g>

  <!-- Vertical divider -->
  <line class="divider" x1="200" y1="40" x2="200" y2="260" opacity="0.4"/>

  <!-- Center: TEMPLE·VIII -->
  <text class="title" x="240" y="165" text-anchor="start">TEMPLE</text>
  <text class="gold" x="240" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" letter-spacing="6" text-anchor="start">· VIII ·</text>

  <!-- Bottom accent line -->
  <line class="divider" x1="240" y1="250" x2="1160" y2="250" opacity="0.3"/>
</svg>