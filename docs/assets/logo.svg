<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="temple8 logo — Greek temple façade with infinity symbol in pediment">
  <!--
    Colors:
      stone-light  #f0ece4
      stone        #c8c0b8
      stone-dark   #a09890
      gold         #c9a84c
  -->

  <!-- Pediment (triangle) -->
  <polygon
    points="50,12 88,34 12,34"
    fill="#f0ece4"
    stroke="#c8c0b8"
    stroke-width="1"
    stroke-linejoin="round"
  />
  <!-- Right-rake shadow -->
  <line x1="50" y1="12" x2="88" y2="34"
        stroke="#a09890" stroke-width="0.8" opacity="0.5"/>

  <!-- Infinity / 8 glyph — gold, centred at (50, 25) in the pediment.
       Total width ~16px (lobes ±4px from centre, rx≈3.5, ry≈2.5).
       Sits neatly inside the upper third of the pediment. -->
  <path
    d="M50,25
       C50,22.5 47.5,21 45.5,21
       C43.5,21 41,22.5 41,25
       C41,27.5 43.5,29 45.5,29
       C47.5,29 50,27.5 50,25
       C50,22.5 52.5,21 54.5,21
       C56.5,21 59,22.5 59,25
       C59,27.5 56.5,29 54.5,29
       C52.5,29 50,27.5 50,25 Z"
    fill="none"
    stroke="#c9a84c"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Entablature -->
  <rect x="12" y="34" width="76" height="7" fill="#f0ece4" stroke="#c8c0b8" stroke-width="0.6"/>
  <rect x="12" y="40" width="76" height="1.2" fill="#a09890" opacity="0.35"/>

  <!-- Column 1 -->
  <rect x="16" y="41" width="8" height="38" fill="#f0ece4"/>
  <rect x="22" y="41" width="2" height="38" fill="#a09890" opacity="0.25"/>
  <!-- Column 2 -->
  <rect x="34" y="41" width="8" height="38" fill="#f0ece4"/>
  <rect x="40" y="41" width="2" height="38" fill="#a09890" opacity="0.25"/>
  <!-- Column 3 -->
  <rect x="58" y="41" width="8" height="38" fill="#f0ece4"/>
  <rect x="64" y="41" width="2" height="38" fill="#a09890" opacity="0.25"/>
  <!-- Column 4 -->
  <rect x="76" y="41" width="8" height="38" fill="#f0ece4"/>
  <rect x="82" y="41" width="2" height="38" fill="#a09890" opacity="0.25"/>

  <!-- Stylobate — three stepped courses -->
  <rect x="12" y="79" width="76" height="5" fill="#f0ece4" stroke="#c8c0b8" stroke-width="0.5"/>
  <rect x="9"  y="84" width="82" height="5" fill="#c8c0b8"/>
  <rect x="6"  y="89" width="88" height="5" fill="#a09890" opacity="0.7"/>
</svg>
